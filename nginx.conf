worker_processes 1;

events {
  worker_connections 1024;
}

http {
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  server_tokens off;
  upstream collab_servers {
    # No sticky sessions here on purpose: any instance can serve any
    # connection because Redis pub/sub (Phase 4) fans updates out to all
    # of them. That's the property this whole compose file exists to prove.
    server server-a:1234;
    server server-b:1234;
  }

  server {
    listen 8080;

    location / {
      limit_req zone=api burst=40 nodelay;
      proxy_pass http://collab_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      # Overwrite (not append) so a client can't spoof this to defeat
      # IP-based rate limiting (login brute-force, general HTTP limiter, WS
      # connect limiter) — nginx is the only entry point in this deployment,
      # so $remote_addr here is always the real peer, never client-supplied.
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_read_timeout 3600s;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }
  }
}
