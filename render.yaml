services:
  - type: web
    name: collab-workspace-api
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @collab/server build
    startCommand: pnpm --filter @collab/server exec tsx src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: collab-workspace-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: collab-workspace-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false

  - type: redis
    name: collab-workspace-redis
    plan: starter
    maxmemoryPolicy: noeviction

  - type: web
    name: collab-workspace-client
    runtime: static
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @collab/client build
    staticPublishPath: packages/client/dist
    envVars:
      - key: VITE_WS_URL
        sync: false

databases:
  - name: collab-workspace-db
    plan: starter
